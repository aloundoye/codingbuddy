name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: quality (fmt + clippy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  tests:
    name: tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: quality
    permissions:
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    env:
      CARGO_BUILD_JOBS: "1"
      RUSTFLAGS: -C debuginfo=0

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: tests (workspace split: core)
        run: cargo test --workspace --all-targets --exclude codingbuddy-agent --exclude codingbuddy-cli --exclude codingbuddy-ui

      - name: tests (workspace split: agent)
        run: cargo test -p codingbuddy-agent --all-targets

      - name: tests (workspace split: cli)
        run: cargo test -p codingbuddy-cli --all-targets

      - name: tests (workspace split: ui)
        run: cargo test -p codingbuddy-ui --all-targets

      - name: build
        run: cargo build --workspace

      - name: conformance scripts
        if: runner.os == 'Linux'
        run: |
          bash scripts/parity_regression_check.sh
          bash scripts/runtime_conformance_scan.sh

      - name: cli smoke
        run: cargo run --bin codingbuddy -- --json status

      - name: installer dry-run (unix)
        if: runner.os != 'Windows'
        run: bash scripts/install.sh --dry-run --version v0.0.0 --repo example/example

      - name: installer dry-run (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/install.ps1 -DryRun -Version v0.0.0 -Repo example/example

  smoke-macos:
    name: smoke (macos)
    runs-on: macos-latest
    needs: quality
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: build
        run: cargo build --workspace

      - name: cli smoke
        run: cargo run --bin codingbuddy -- --json status
