<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodingBuddy</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #1a1b26;
        --surface: #24283b;
        --border: #3b4261;
        --text: #c0caf5;
        --text-muted: #565f89;
        --accent: #7aa2f7;
        --accent-dim: #3d59a1;
        --success: #9ece6a;
        --error: #f7768e;
        --font-mono: "JetBrains Mono", "Fira Code", "SF Mono", Menlo, monospace;
        --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui,
          sans-serif;
      }
      html,
      body,
      #app {
        height: 100%;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-sans);
        font-size: 14px;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
